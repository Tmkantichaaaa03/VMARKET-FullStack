<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการคำสั่งซื้อ - VMARKET SELLER PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../seller_panel/css/dashboard.css">
    <link rel="stylesheet" href="../seller_panel/css/orders.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ===== Navbar + Notification ===== */
        .noti-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .noti-link {
            font-size: 20px;
            text-decoration: none;
            position: relative;
            cursor: pointer;
            padding: 0 15px;
        }

        .badge {
            position: absolute;
            top: -2px;
            right: 5px;
            background-color: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid #fff;
        }

        .noti-dropdown {
            display: none;
            position: absolute;
            right: 10px;
            top: 50px;
            width: 300px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            border: 1px solid #ddd;
        }

        .noti-header {
            padding: 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .noti-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .noti-item {
            padding: 12px;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
        }

        .noti-item:hover { background-color: #f1f2f6; }

        .profile-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-shop-name {
            font-size: 14px;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ปรับขนาดโลโก้ใน Navbar */
        .nav-logo-img {
            height: 120px;
            width: auto;
            display: block;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .nav-logo-img:hover {
            transform: scale(1.05);
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<main class="content">
    <div class="container wide">
        <div class="order-layout">
            <div class="order-card">
                <h2 class="page-title fancy-title">
                    <i class="fas fa-box-open"></i>
                    รายการคำสั่งซื้อทั้งหมด
                </h2>

                <div class="table-responsive">
                    <table id="orderTable">
                        <thead>
                            <tr>
                                <th>ลำดับ</th> <th>วันที่</th>
                                <th>จำนวน</th>
                                <th>ยอดรวม</th>
                                <th>การชำระเงิน</th>
                                <th>สถานะออเดอร์</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="orderList"></tbody>
                    </table>
                </div>
                <div id="orderMessage" class="empty-message"></div>
            </div>

            <div id="orderDetailPanel" class="detail-panel">
                <div class="detail-header">
                    <h3>รายละเอียดคำสั่งซื้อ</h3>
                    <button onclick="closeDetailPanel()">✕</button>
                </div>

                <div class="detail-content">
                    <p><b>คำสั่งซื้อลำดับที่:</b> <span id="detOrderId" style="font-weight: bold; color: #e67e22;"></span></p>
                    <p><b>ชื่อลูกค้า:</b> <span id="detCustName"></span></p>
                    <p><b>เบอร์:</b> <span id="detCustPhone"></span></p>
                    <p><b>ที่อยู่:</b> <span id="detCustAddr"></span></p>

                    <hr>
                    <h4>รายการสินค้า</h4>
                    <div id="detItemList"></div>

                    <h3 class="total-box">
                        ยอดรวมสุทธิ: <span id="detTotal"></span> บาท
                    </h3>
                    <hr>

                    <p>
                        <b>สถานะการชำระเงิน:</b>
                        <span id="detPaymentStatus"></span>
                    </p>

                    <p id="slipSection" style="display:none;">
                        <b>หลักฐานการชำระเงิน</b>
                        <br>
                        <a id="viewSlipBtn" href="#" target="_blank" class="view-slip-btn">
                            ตรวจสอบหลักฐานการชำระเงิน
                        </a>
                    </p>

                    <div id="actionSection"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>

<script>
// จัดการ Navbar
fetch("navbar.html")
  .then(res => res.text())
  .then(async data => {
    document.getElementById("navbar").innerHTML = data;
    const currentPage = location.pathname.split("/").pop();
    document.querySelectorAll(".nav-center a").forEach(link => {
        if (link.getAttribute("href") === currentPage) {
            link.classList.add("active");
        }
    });

    if (typeof displayShopName === "function") await displayShopName();
    if (typeof fetchNotifications === "function") {
        fetchNotifications();
        setInterval(fetchNotifications, 60000);
    }
  });

window.addEventListener('load', async function() {
    if (typeof checkAuth === "function") checkAuth();
    if (typeof displayShopName === "function") await displayShopName();
    if (typeof loadSellerOrders === "function") loadSellerOrders();
});

/* ================= OPEN DETAIL (แก้ไขให้รับ displayId) ================= */
window.viewDetails = async function(orderId, displayId) { // เพิ่ม displayId รับมาจาก main.js
    currentOrderId = orderId;

    document.getElementById("orderDetailPanel").classList.add("open");
    document.querySelector(".order-layout").classList.add("shift");

    try {
        const response = await fetch(
            `${BASE_API_URL}orders/get_order_details.php?order_id=${orderId}`
        );
        const result = await response.json();
        if (!result.success) return;

        const d = result.data;

        // นำ displayId (ลำดับ 1, 2, 3) มาแสดงที่ UI
        document.getElementById('detOrderId').innerText = displayId; 
        
        document.getElementById('detCustName').innerText = d.customer_name;
        document.getElementById('detCustPhone').innerText = d.phone_number;
        document.getElementById('detCustAddr').innerText = `${d.address} ${d.city} ${d.postal_code}`;
        document.getElementById('detTotal').innerText = parseFloat(d.total_amount).toLocaleString();

        /* ===== PAYMENT ===== */
        const payEl = document.getElementById("detPaymentStatus");
        const paymentStatus = (d.payment_status || "").toLowerCase().trim();
        if (paymentStatus === "paid") {
            payEl.innerText = "ชำระเงินแล้ว";
            payEl.className = "pay-paid";
        } else {
            payEl.innerText = "ชำระเงินปลายทาง";
            payEl.className = "pay-cod";
        }

        /* ===== SLIP ===== */
        const slipSection = document.getElementById("slipSection");
        const slipBtn = document.getElementById("viewSlipBtn");
        if (d.payment_slip && d.payment_slip !== "") {
            slipBtn.href = `assets/slips/${d.payment_slip}`;
            slipSection.style.display = "block";
        } else {
            slipSection.style.display = "none";
        }

        /* ===== STATUS + BUTTONS ===== */
        const actionSection = document.getElementById("actionSection");
        let buttonsHTML = "";
        const status = (d.status || "").trim();

        if (status === "รอการยืนยัน") {
            buttonsHTML = `
                <button onclick="updateOrderStatus('confirmed')" class="btn-confirm">ยืนยันคำสั่งซื้อ</button>
                <button onclick="updateOrderStatus('cancelled')" class="btn-cancel">ยกเลิก</button>
            `;
        } else if (status === "กำลังจัดส่ง") {
            buttonsHTML = `<button onclick="updateOrderStatus('completed')" class="btn-complete">จัดส่งสำเร็จ</button>`;
        } else if (status === "จัดส่งสำเร็จ") {
            buttonsHTML = `<span class="success-label">✔ จัดส่งสำเร็จแล้ว</span>`;
        } else if (status === "ยกเลิกออเดอร์") {
            buttonsHTML = `<span class="cancel-label">✖ ออเดอร์ถูกยกเลิกแล้ว</span>`;
        }
        actionSection.innerHTML = buttonsHTML;

        /* ===== ITEMS ===== */
        document.getElementById('detItemList').innerHTML = d.items.map(item => `
            <div class="item-row">
                <span>${item.product_name}</span>
                <span>${item.quantity} x ${parseFloat(item.price).toLocaleString()}</span>
            </div>
        `).join('');

    } catch (e) {
        console.error(e);
    }
};

function closeDetailPanel() {
    document.getElementById("orderDetailPanel").classList.remove("open");
    document.querySelector(".order-layout").classList.remove("shift");
}
</script>

</body>
</html>
